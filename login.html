<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taskora | Login</title>
  <link rel="icon" type='image/x-icon' href="https://img.icons8.com/plasticine/1200/work-authorisation.jpg">
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- style -->
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <div id="notification"></div>
  <div class="container">
    <!-- left side -->
    <div class="left">
      <h2>Welcome Back</h2>
      <p class="subtitle">Login using registered credentials</p>
      <form id="loginForm" action="#" method="post">
        <!-- username -->
        <div class="input-box">
          <label for="username"><i class="fa fa-user left-icon"></i></label>
          <input type="text" id="username" name="username" placeholder="User Name or Email" title="Enter you registered usrename or email" required><br><br>
        </div>
        <!-- password -->
        <div class="input-box">
          <label for="password"><i class="fa fa-lock left-icon"></i></label>
          <input type="password" id="password" name="password" placeholder="Password" required>
          <span class="show-password"><i class="fa fa-eye-slash right-icon" onclick="togglePassword('password', this)"></i></span>
        </div><br><br>
        <!-- login -->
        <button type="submit" class="login-btn">Login</button>
      </form>
    </div>
    <!-- right side -->
    <div class="right">
      <h2>New Here?</h2>
      <p>Register Now!</p>
      <a href="register.html" class="signup-btn">Sign Up</a>
    </div>
  </div>
  <script src="/js/login.js"></script>
  <script src="/js/common.js"></script>
</body>
</html>
